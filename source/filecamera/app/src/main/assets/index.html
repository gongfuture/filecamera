<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>巡查水印相机</title>
    <style>
		:root {
			/* 主色调 - 蓝灰色系 */
			--primary-bg: #f8f9fa;
			--secondary-bg: #ffffff;
			--card-bg: #ffffff;
			--border-color: #e1e4e8;
			--title-bg:#555;
			/* 深色元素 */
			--dark-bg: #2c3e50;
			--dark-hover: #34495e;
			--darker-bg: #1a252f;
			
			/* 文字颜色 */
			--text-primary: #24292e;
			--text-secondary: #586069;
			--text-muted: #6a737d;
			--text-light: #ffffff;
			
			/* 强调色 */
			--accent-color: #0366d6;
			--accent-hover: #0256c7;
			--waring-color:#ff9800;
			--waring-hover:#f57c00;
			--danger-color: #d73a49;
			--danger-hover: #cb2431;
			
			/* 阴影 */
			--shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
			--shadow-md: 0 2px 8px rgba(0, 0, 0, 0.1);
			
			/* 禁用状态 */
			--disabled-color: #d9d9d9;
		}
		* {
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent !important;  /* ← 这个专门针对移动端触摸高亮 */
			outline: none !important;                              /* ← 这个针对焦点边框 */			
		}
		body, html {
			width: 100%;
			height: 100%; 
			display: flex;
			flex-direction: column;
			align-items: center; 
			overflow: hidden;
			margin: 0;
			background-color: var(--primary-bg);
		}
		#win_modal {
			display:none;
			position: fixed; 
			flex-direction:column;
			z-index: 1100;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			overflow: auto;
			justify-content: center;  /* 水平居中 */
			align-items: center;      /* 垂直居中 */
			background-color: rgba(0,0,0,0);
			gap:10px;
		}		
		#alert_div,#prompt_div,#confirm_div{
			display:none;
			border-radius: 8px;
			min-width: 300px;
			max-width:100%;
			min-height: 150px;
			flex-direction:column;
			justify-content: center;  /* 水平居中 */
			align-items: center;      /* 垂直居中 */
			background-color: var(--card-bg);
			color:var(--text-primary);
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
		}
		.win_confirm_button{
            background: var(--dark-bg);;
            color: var(--text-light);
			border-top: 1px solid var(--border-color);	
			border-bottom: none;
			border-right: none;	
			border-left: none;			
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;		
		}
		.win_confirm_button.hover{
            background: var(--dark-hover);		
		}		
		.win_cance_button{
            background: var(--waring-color);
            color: var(--text-light);
			border-top: 1px solid var(--border-color);
			border-bottom: none;
			border-left: none;
			border-right: none;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;		
		}
		.win_cance_button.hover{
			background:var(--waring-hover)
		}
		.win_alert_button{
            background: var(--dark-bg);
            color: var(--text-light);
			border-top: 1px solid var(--border-color);
			border-bottom: none;
			border-right: none;
			border-left: none;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;		
		}
		.win_alert_button.hover{
            background: var(--dark-hover);		
		}		
		.win_main_div{
			display:flex;
			flex:1;
			justify-content: center;
			align-items:center;
			flex-direction:column;
			padding:30px;
			gap:5px;
			width:100%;
		}	
		.win_text_div{
			display:flex;
			width:100%;
			justify-content: center;  /* 水平居中 */
			align-items: center;      /* 垂直居中 */
			color:var(--text-primary);
		}
        .win_input {
            padding: 8px;
			flex:1;
            border: 1px solid var(--border-color);
			color:var(--text-primary);
            border-radius: 4px;
        }		
		.win_button_div{
			display:flex;
			width:100%;
			bottom:0;
			justify-content: center;  /* 水平居中 */
			align-items: center;      /* 垂直居中 */	
			overflow:hidden;
			border-radius: 0 0 8px 8px;
		}
		#filediv {
			width: 100%;
			display: flex;
			flex-direction: row;
			background-color: var(--dark-bg);
			height: 40px;
			margin: 0;
			border-bottom: 1px solid var(--border-color);
		}

		#fileinput {
			background-color: var(--secondary-bg);
			outline: none;
			border: 0;
			display: flex;
			flex: 1;
			border-bottom: 1px solid var(--border-color);
			color: var(--text-primary);
		}
		#backspan {
			display: flex;
			background-color: var(--dark-bg);
			color: var(--text-light);
			width: 50px;
			text-align: center;
			align-items: center;
			justify-content: center;
			transition: background-color 0.2s;
		}

		#gospan {
			display: flex;
			background-color: var(--dark-bg);
			padding: 5px;
			color: var(--text-light);
			width: 80px;
			text-align: center;
			align-items: center;
			justify-content: center;
			transition: background-color 0.2s;
		}

		#backspan:hover,
		#gospan:hover,
		#menuspan:hover {
			background-color: var(--dark-hover);
		}

		#menuspan {
			display: flex;
			background-color: var(--dark-bg);
			padding: 5px;
			color: var(--text-light);
			width: 50px;
			text-align: center;
			align-items: center;
			justify-content: center;
			transition: background-color 0.2s;
		}

		#menu {
			position: absolute;
			display: flex;
			width: 0;
			height: 100%;
			margin: 0;
			background-color: var(--secondary-bg);
			transition: width 0.2s ease-out;
			border: 0;
			flex-direction: column;
			z-index: 4;
			overflow: hidden;
		}

		#menu.expanded {
			width: 200px;
			box-shadow: var(--shadow-md);
			border-right: 1px solid var(--border-color);
		}

		.menu_li {
			display: flex;
			gap: 10px;
			width: 100%;
			margin: 10px 0;
			height: 30px;
			background: none;
			border: none;
			color: var(--text-secondary);
			font-size: inherit;
			flex-direction: row;
			overflow: hidden;
			white-space: nowrap;
			transition: color 0.2s;
		}

		.menu_li:hover {
			color: var(--accent-color);
		}

		.menu_li_bottom {
			display: flex;
			gap: 10px;
			width: 100%;
			margin-left: 10px;
			margin-right: 10px;
			margin-bottom: 20px;
			margin-top: auto;
			height: 30px;
			background: none;
			border: none;
			color: var(--text-secondary);
			font-size: inherit;
			flex-direction: row;
			overflow: hidden;
			white-space: nowrap;
		}
		.picture_view_bottom_div{
			display:flex;width:100%;
			height:50px;
			margin:0px;
			color: white;
			background-color:var(--dark-bg);
			border-top: 1px solid var(--border-color);
			align-items: center;
			justify-content: center;gap:1px;
		
		
		}
		ul {
			width: 100%;
			height: 100%;
			list-style-type: none;
			margin: 0;
			padding: 0;
		}


		#tablediv{
			display:flex;
			flex:1;
			width:100%;
			background-color: var(--primary-bg);
		}
		#table1tbody{
			display:flex;
			flex-direction:column;
			flex:1;
			overflow:auto;
			background-color: var(--primary-bg);
			width:100%;
		}
		#indextable {
			width: 100%;
			display:flex;
			flex-direction:column;
			flex:1;
			background-color: var(--primary-bg);
		}
		.icon_div{
			display:flex;
			padding:0;
			object-fit:contain;
			align-items:center;
			position:relative;
		}
		#controndiv {
			display: flex;
			width: 100%;
			margin: 0;
			background-color: var(--secondary-bg);
			border-top: 1px solid var(--border-color);
			justify-content: center;
			align-items: center;
		}
		#bottom_controndiv {
			display: flex;
			width: 100%;
			height: 50px;
			margin: 0;
			color: var(--text-light);
			background-color: var(--dark-bg);
			border-top: 1px solid var(--border-color);
			align-items: center;
			justify-content: center;
			gap: 1px;
		}

		#bottom_controndiv span {
			display: flex;
			background-color: var(--danger-color);
			height: 100%;
			width: 110px;
			border: none;
			color: var(--text-light);
			font-size: inherit;
			align-items: center;
			justify-content: center;
			transition: background-color 0.2s;
		}

		#bottom_controndiv span:hover {
			background-color: var(--danger-hover);
		}

		#hidecontrondiv {
			display: flex;
			width: 100%;
			height:0;
			margin: 0;
			background-color: var(--secondary-bg);
			justify-content: center;
			align-items: center;
			transition: height 0.2s ease-out;
			border: 0;
			overflow:hidden;
		}
		#hidecontrondiv.expanded {
			border: 1px solid var(--border-color);
			height: 50px;
		}
		#hidecontron_child_div{
			display:flex;
			justify-content: center;
			align-items: center;			
			width:100%;
			flex-direction:row;
		}
		#hidecontron_child_div span {
			display: flex;
			flex:1;
			flex-direction: column;
			background: none;
			border: none;
			color: var(--text-secondary);
			padding:10px 0;
			font-size: inherit;
			align-items: center;
			justify-content: center;
		}

		#comfirediv {
			display: flex;
			width: 100%;
			height: 0;
			justify-content: center;
			align-items: center;
			gap: 5px;
			border: 0;
			overflow: hidden;
			background-color: var(--primary-bg);
			transition: height 0.2s ease-out;
		}

		#comfirediv.expanded {
			border: 1px solid var(--border-color);
			height: 50px;
		}

		#cancebutton,
		#comfirebutton {
			text-align: center;
			height: 80%;
			border: none;
			width: 100px;
			background-color: var(--dark-bg);
			color: var(--text-light);
			transition: background-color 0.3s;
			border-radius: 4px;
		}

		#cancebutton:hover,
		#comfirebutton:hover {
			background-color: var(--dark-hover);
		}

		#th1 {
			display:flex;
			padding: 5px;
			text-align: center;
			flex: 1;
			justify-content:center;
			align-items:center;
		}

		#th2 {
			display:flex;
			flex:direction:row;
			text-align: right;
			justify-content:center;
			align-items:center;
		}
		#displayfilediv {
			display: flex;
			padding: 0;
			flex-direction: row;
			width: 100%;
			height: 100%;
			align-items: center;
			justify-content: center;
			overflow: hidden;
			transition: transform 0.3s ease-out;
		}

		#filebackbutton:hover,
		#fileforwardbutton:hover,
		#filegotobutton:hover {
			background-color: var(--dark-hover);
		}

		#filebackbutton,
		#fileforwardbutton {
			text-align: center;
			padding: 5px;
			height: 100%;
			border: none;
			width: 70px;
			background-color: var(--dark-bg);
			color: var(--text-light);
			font-size: 16px;
			transition: background-color 0.3s;
		}

		#filegotobutton {
			text-align: center;
			border: none;
			width: 100%;
			height: 100%;
			background-color: var(--dark-bg);
			color: var(--text-light);
			font-size: 16px;
			transition: background-color 0.3s;
		}

		#table1thead {
			display:flex;
			width:100%;
			flex-direction:row;
			background-color: var(--secondary-bg);
			border-bottom: 1px solid var(--border-color);
		}
		.tabletr{
			display:flex;
			flex-direction:row;
			width:100%;
		}
		.tabletr:hover {
			background-color: var(--primary-bg);
		}
		.td1 {
			display: flex;
			flex: 1;
			align-items: center;
			gap:10px;
			padding:8px;
			flex-direction: row;
			height:100%;
		}
		.name_div {
			display: flex;
			flex-direction: row; /* 默认为 row，可以省略 */
			flex-wrap: wrap;      /* 新增：允许子元素换行 */
			word-break: break-all;
			overflow:hidden;
			flex: 1;
			align-items: center;
			padding: 5px 0;
		}
		.td2 {
			display:flex;
			text-align: center;
			align-items:center;
			height:100%;
		}
		#fileimg {
			max-width: 100%;
			max-height: 100%;
			top: 50%;
			left: 50%;
			transform-origin: center center;
			cursor: grab;
			transition: transform 0.1s ease-out;
			pointer-events: none;
		}

		#sortmenu {
			display: flex;
			width: 100%;
			height: 0;
			margin: 0;
			overflow-y: auto;
			background-color: var(--secondary-bg);
			border: 0;
			align-items: center;
			transition: height 0.2s ease-out;
			flex-direction: column;
			color: var(--text-secondary);
		}

		.sort_li {
			display: flex;
			width: 100%;
			padding: 10px 0;
			border-bottom: 1px solid var(--border-color);
			text-align: center;
			align-items: center;
			justify-content: center;
			transition: background-color 0.2s;
		}

		.sort_li:hover {
			background-color: var(--primary-bg);
			color: var(--accent-color);
		}

		#sortmenu.expanded {
			border: 1px solid var(--border-color);
			height: 200px;
		}

		.icon_img {
			max-width: 100%;
			max-height: 100%;
			pointer-events: none;
		}

		.book_cover {
			position: absolute;
			width: 48px;
			height:48px;
			pointer-events: none;
			bottom: 0;
			left: 0;
		}

		#menu2 {
			display: flex;
			width: 100%;
			height: 0;
			margin: 0;
			overflow: hidden;
			background-color: var(--secondary-bg);
			justify-content: center;
			align-items: center;
			transition: height 0.2s ease-out;
			border: 0;
			gap: 50px;
			color: var(--text-secondary);
		}

		#menu2.expanded {
			border: 1px solid var(--border-color);
			height: 50px;
		}

		.menu2check {
			width: 20px;
			height: 20px;
		}
		.row-check,#allcheck {
			width: 20px;
			height: 20px;
			margin-right:20px;
		}	
		* {
			user-select: none;
		}

		#loadingoverlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			background: rgba(0, 0, 0, 0.6);
			display: none;
			justify-content: center;
			align-items: center;
			color: var(--text-light);
			font-size: 16px;
			z-index: 999;
		}
		#loadingoverlay.transparent {
			background: rgba(0, 0, 0, 0);
		}
		#loading-text {
			display: flex;
			flex-direction: column;
			text-align: center;
			align-items: center;
			background-color: var(--darker-bg);
			padding: 20px;
			border-radius: 8px;
			box-shadow: var(--shadow-md);
		}

		@keyframes spin {
			from { transform: rotate(0deg); }
			to { transform: rotate(360deg); }
		}

		#loadingimg {
			animation: spin 2s linear infinite;
		}

		.menutextdiv {
			display: flex;
			align-items: center;
			flex: 1;
			color: var(--text-muted);
			border-bottom: 1px solid var(--border-color);
			margin: 0 10px;
			pointer-events: none;
		}

		.back_button {
			position: absolute;		
			display: flex;
			margin-left: auto;
			right:0;
			height: 100%;
			background-color: var(--danger-color);
			color: var(--text-light);
			width: 50px;
			text-align: center;
			align-items: center;
			justify-content: center;
			transition: background-color 0.2s;
		}
		.back_button:hover {
			background-color: var(--danger-hover);
		}

		#picturecontrondiv {
			display: flex;
			width: 100%;
			height: 50px;
			margin: 0;
			background-color: var(--secondary-bg);
			border-top: 1px solid var(--border-color);
			justify-content: center;
			align-items: center;
		}

		#picturecontrondiv span {
			display: flex;
			flex-direction: column;
			background: none;
			border: none;
			color: var(--text-secondary);
			padding: 5px 25px;
			height: 100%;
			font-size: inherit;
			align-items: center;
			justify-content: center;
		}

		#picturediv {
			display: flex;
			position: absolute;
			right: -100%;
			width: 100%;
			height: 100%;
			padding: 0;
			margin: 0;
			flex-direction: column;
			flex: 1;
			align-items: center;
			z-index: 5;
			background-color: var(--secondary-bg);
			overflow: hidden;
			transition: right 0.2s ease-out; 
			transform-origin: right;
			box-shadow: var(--shadow-md);
		}

		#picturediv.expanded {
			right: 0;
		}
		/* 容器基础样式 */
		.child_page{
			display: flex;
			position: fixed;
			right: -100%;
			width: 100%;
			height: 100%;
			padding: 0;
			margin: 0;
			flex-direction: column;
			overflow:auto;
			flex: 1;
			align-items: center;
			z-index: 100;
			background-color: white;
			box-shadow: var(--shadow-md);
			transition: right 0.2s ease-out; 
		}
		.child_page.expanded {
			right: 0;
		}
		.child_page_content{
			display:flex;
			justify-content: center;
			flex:1;
			width:100%;
			overflow:auto;
		}
		.child_page_title_div{
			display:flex;
			width:100%;
			height:40px;
			margin:0px;
			color: white;
			background-color:var(--dark-bg);
			align-items: center;
			justify-content: center;
			position:relative;
		}
		.child_page_title_span{
			display:flex;
			width:100%;		
			text-align:center;
			justify-content:center;
			align-items: center;
		}
		#size_text_div{
			display:flex;
			align-items: center;
			flex:1;
			color:grey;
			margin:0 10px;
		}
    </style>
   <style>
	 input[type="text"], input[type="number"], select {
		display: block;
		width: 100%;
		padding: 0.5rem;
		font-size: 1rem;
		line-height: 1.5;
		background-color: var(--secondary-bg);
		background-clip: padding-box;
		border: 1px solid var(--input-border-color);
		border-radius: 0.25rem;
		transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
		box-sizing: border-box;
	}
	input:disabled {
		background-color: var(--disabled-color);
	}  
   	#watermark-config {
		font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
   		padding: 12px;
   		background-color: var(--primary-bg);
   		color: var(--text-primary);
   		box-sizing: border-box;
		width:100%;
		display:flex;
		flex-direction: column;
   	}

   	.watermark-config *,
   	.watermark-config *::before,
   	.watermark-config *::after {
   		box-sizing: border-box;
   	}

   	/* 卡片样式 */
   	.watermark-config .card {
   		background-color: var(--card-bg);
   		border-radius: 8px;
   		margin-bottom: 16px;
   		border: 1px solid var(--border-color);
   		overflow: hidden;
   		box-shadow: var(--shadow-sm);
   	}

   	.watermark-config .card-header,
   	.watermark-config summary {
   		display: flex;
   		justify-content: space-between;
   		align-items: center;
   		padding: 14px 16px;
   		font-weight: 600;
   		border-bottom: 1px solid var(--border-color);
   		list-style: none;
   		cursor: pointer;

	function formatBytes(bytes) {
	  if (bytes === 0) return '0 Bytes';
	  const units = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
	  const k = 1024; // 1 KB = 1024 Bytes
	  const i = Math.floor(Math.log(bytes) / Math.log(k)); // 确定单位
	  return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + units[i];
	}
